<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body style="background:#0f172a;color:white;text-align:center;font-family:Arial;">

<h2>Results for {{email}}</h2>

{% if results %}
    {% for r in results %}
    <div style="margin:20px;padding:20px;background:#1e293b;border-radius:10px;">
        <h3>⚠️ Leak Found</h3>

        <p><b>Source:</b> {{r.source}}</p>
        <p><b>Risk:</b> {{r.risk}}</p>

        <h4>💀 Possible Attacks</h4>
        <ul>
            {% for a in r.attack %}
            <li>{{a}}</li>
            {% endfor %}
        </ul>

        <h4>🛡 Prevention</h4>
        <p>{{r.fix}}</p>
    </div>
    {% endfor %}
{% else %}
    <h3>✅ No leaks found</h3>
{% endif %}

<br>
<a href="/" style="color:white;">Back</a>

</body>
</html>
